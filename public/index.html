<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крутилка</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container landing">
        <span class="casino-decor top-left">&spades;</span>
        <span class="casino-decor bottom-right">&diams;</span>

        <h1>Крутилка</h1>
        <div class="ornament">&clubs; &diams; &hearts; &spades;</div>

        <form id="createForm" class="create-form">
            <label for="topicInput">Тема</label>
            <input type="text" id="topicInput" placeholder="Например: Куда идём есть?" required>
            <button type="submit">Создать комнату</button>
        </form>

        <div id="result" class="result" style="display:none">
            <p>Комната создана!</p>
            <p style="color: var(--text-secondary); font-size: 14px; font-weight: 400;">Ссылка для участников:</p>
            <div class="link-box">
                <a id="participantLink" href="#" target="_blank"></a>
            </div>
            <p style="margin-top:8px; color: var(--text-secondary); font-size: 14px; font-weight: 400;">Ваша админка:</p>
            <div class="link-box">
                <a id="adminLink" href="#" target="_blank"></a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('createForm');
        const result = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) return;

            const res = await fetch('/api/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic }),
            });
            const data = await res.json();

            const base = window.location.origin;
            const participantUrl = `${base}/room/${encodeURIComponent(data.id)}`;
            const adminUrl = `${base}/room/${encodeURIComponent(data.id)}/admin?token=${encodeURIComponent(data.adminToken)}`;

            const pEl = document.getElementById('participantLink');
            const aEl = document.getElementById('adminLink');
            if (participantUrl.startsWith(base)) {
                pEl.href = participantUrl;
                pEl.textContent = participantUrl;
            }
            if (adminUrl.startsWith(base)) {
                aEl.href = adminUrl;
                aEl.textContent = adminUrl;
            }

            form.style.display = 'none';
            result.style.display = 'block';
        });
    </script>
</body>
</html>
